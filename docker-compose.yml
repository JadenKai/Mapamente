services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: mapamente
      DB_PASSWORD: password
      DB_NAME: mapamente
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: mapamente
      MYSQL_USER: mapamente
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql

volumes:
  db_data:
